name: Publish npm

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  gate:
    name: Pre-publish gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get install -y jq ripgrep

      - name: Run runtime gate tests
        run: ./scripts/run_runtime_gate_tests.sh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Node tests
        run: npm test

      - name: Validate bundled skill format
        run: python3 scripts/check_skill_format.py skills/mco-cli

      - name: Validate package/runtime version alignment
        run: python3 scripts/check_package_version.py

      - name: Run npm packaging smoke
        run: ./scripts/run_npm_packaging_smoke.sh

  publish:
    name: Publish npm package
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Require npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not configured; refusing to publish."
            exit 1
          fi

      - name: Verify npm identity
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
